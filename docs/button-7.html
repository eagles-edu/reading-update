<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Bootstrap Style Button Light Color</title>
<style>
.btn-7 {
    display: inline-block;
    color: #212529;
    text-align: center;
    text-decoration: none;
    vertical-align: middle;
    cursor: pointer;
    user-select: none;
    padding: 12px 20px;
    font-size: 14px;
    border-radius: .25rem;
    border: solid 1px;
    font-weight: bold;
    letter-spacing: 1.2px;
    /*** full width block ***/
    /* width: 100%; */
}

.btn-7-colors {
    color: #000;
    background-color: #f8f9fa;
    border-color: #f8f9fa;
}

.btn-7:disabled {
    pointer-events: none;
    opacity: .65;
}
</style>
</head>
<body>
<!-- https://www.css-buttons.com/buttons/7/bootstrap-style-button-light-color -->

<button type="button" class="btn-7 btn-7-colors">Button 7</button>
</body>
</html>
