<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Keyboard Keys Style Button Dark Color</title>
<style>
.btn-136 * {
    box-sizing: border-box;
}

.btn-136 {
    outline: none;
    border: none;
    background: transparent;
    cursor: pointer;
    text-decoration: none;
    user-select: none;
    display: inline-flex;
    justify-content: center;
    align-items: center;
    padding: 0;
    width: 80px;
    /*** full width block ***/
    /* width: 100%; */
}

.btn-136:active span::before {
    bottom: 0px;
    right: 0;
    top: 2px;
    left: 2px;
}

.btn-136:active span i {
    top: 8px;
}

.btn-136 span {
    cursor: pointer;
    position: relative;
    height: 80px;
    width: 100%;
    padding: 8px 15px;
    margin: 8px 4px;
    display: inline-block;
    border-radius: 10px;
    background: linear-gradient(180deg, #282828, #202020);
    box-shadow: inset -8px 0 8px rgba(0, 0, 0, 0.15),
        inset 0 -8px 8px rgba(0, 0, 0, 0.25), 0 0 0 2px rgba(0, 0, 0, 0.75),
        10px 20px 25px rgba(0, 0, 0, 0.4);
    overflow: hidden;
}

.btn-136 span::before {
    content: "";
    position: absolute;
    top: 3px;
    left: 4px;
    bottom: 14px;
    right: 12px;
    background: linear-gradient(90deg, #232323, #4a4a4a);
    border-radius: 10px;
    box-shadow: -10px -10px 10px rgba(255, 255, 255, 0.25),
        10px 5px 10px rgba(0, 0, 0, 0.15);
    border-left: 1px solid #0004;
    border-bottom: 1px solid #0004;
    border-top: 1px solid #0009;
}

.btn-136 span i {
    font-family: Arial, Helvetica, sans-serif;
    position: relative;
    font-style: normal;
    font-size: 24px;
    text-transform: uppercase;
    color: #fff;
}

/*** disabled style ***/
.btn-136:disabled {
    pointer-events: none;
    opacity: .65;
    color: #7e7e7e;
    background: none;
    text-shadow: none;
    box-shadow: none;
}

.btn-136:disabled span {
    background: #dcdcdc;
    box-shadow: inset -8px 0 8px rgba(0, 0, 0, 0.15), inset 0 -8px 8px rgba(0, 0, 0, 0.25), 0 0 0 2px rgb(100 100 100 / 75%), 10px 20px 25px rgba(0, 0, 0, 0.4);
}

.btn-136:disabled span::before {
    background: #dcdcdc;
    border-top: 1px solid #85858599;
}
</style>
</head>
<body>
<!-- https://www.css-buttons.com/buttons/136/keyboard-keys-style-button-dark-color -->

<button class="btn-136">
    <span>
      <i>Z</i>
    </span>
</button>
</body>
</html>
