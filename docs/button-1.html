<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Bootstrap Style Button Primary Blue Color</title>
<style>
.btn-1 {
    color: #fff;
    background-color: #0d6efd;
    border-color: #0d6efd;
    font-family: Arial, Helvetica, sans-serif;
    display: inline-block;
    text-align: center;
    text-decoration: none;
    vertical-align: middle;
    cursor: pointer;
    user-select: none;
    padding: 12px 20px;
    font-size: 14px;
    border-radius: .25rem;
    font-weight: bold;
    letter-spacing: 1px;
    border: none;
    /*** full width block ***/
    /* width: 100%; */
}

.btn-1:hover {
    color: #fff;
    background-color: #0b5ed7;
}

.btn-1:active {
    box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.24);
}

/*** disabled style ***/
.btn-1:disabled {
    pointer-events: none;
    opacity: .65;
}
</style>
</head>
<body>
<!-- https://www.css-buttons.com/buttons/1/bootstrap-style-button-primary-blue-color -->

<button type="button" class="btn-1">Button 1</button>
</body>
</html>
