<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Bootstrap Style Button Success Color</title>
<style>
.btn-3 {
    color: #fff;
    background-color: #198754;
    display: inline-block;
    text-align: center;
    text-decoration: none;
    vertical-align: middle;
    cursor: pointer;
    user-select: none;
    padding: 12px 20px;
    font-size: 14px;
    border-radius: .25rem;
    border: none;
    font-weight: bold;
    letter-spacing: 1.2px;
    /*** full width block ***/
    /* width: 100%; */
}

.btn-3:hover {
    color: #fff;
    background-color: #157347;
    border-color: #146c43;
}

.btn-3:active {
    box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.24);
}

.btn-3:disabled {
    pointer-events: none;
    opacity: .65;
}
</style>
</head>
<body>
<!-- https://www.css-buttons.com/buttons/3/bootstrap-style-button-success-color -->

<button type="button" class="btn-3">Button 3</button>
</body>
</html>
