<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Bootstrap Style Button Secondary Dark Color</title>
<style>
.btn-2 {
    color: #fff;
    background-color: #6c757d;
    border-color: #6c757d;
    display: inline-block;
    text-align: center;
    text-decoration: none;
    vertical-align: middle;
    cursor: pointer;
    user-select: none;
    padding: 12px 20px;
    font-size: 14px;
    border-radius: .25rem;
    border: none;
    font-weight: bold;
    letter-spacing: 1.2px;
    /*** full width block ***/
    /* width: 100%; */
}

.btn-2:hover {
    color: #fff;
    background-color: #5c636a;
}

.btn-2:active {
    box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.24);
}

/*** disabled style ***/
.btn-2:disabled {
    pointer-events: none;
    opacity: .65;
}
</style>
</head>
<body>
<!-- https://www.css-buttons.com/buttons/2/bootstrap-style-button-secondary-dark-color -->

<button type="button" class="btn-2">Button 2</button>
</body>
</html>
