<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Slanted Button</title>
<style>
.btn-166 {
    --border_radius: 5px;
    background: #ff0000;
    color: #fff;
    border: none;
    padding: 10px 20px;
    font-size: 15px;
    font-weight: 600;
    text-transform: uppercase;
    transform: skew(-22deg);
    font-family: Arial, Helvetica, sans-serif;
    cursor: pointer;
    text-decoration: none;
    user-select: none;
    display: inline-flex;
    justify-content: center;
    align-items: center;
    z-index: 1;
    border-radius: var(--border_radius);
    /*** full width block ***/
    /* width: 100%; */
}

.btn-166 span {
    display: flex;
    transform: skew(22deg);
    align-items: center;
    justify-content: center;
}

.btn-166::before {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    right: 100%;
    left: 0;
    background: #141414;
    opacity: 0;
    z-index: -1;
    transition: all 0.5s;
    border-radius: var(--border_radius);
}

.btn-166:hover {
    color: #fff;
}

.btn-166:hover::before {
    left: 0;
    right: 0;
    opacity: 1;
}

/*** disabled style ***/
.btn-166:disabled {
    pointer-events: none;
    opacity: .65;
    color: #7e7e7e;
    background: #dcdcdc;
    box-shadow: none;
    text-shadow: none;
}
</style>
</head>
<body>
<!-- https://www.css-buttons.com/buttons/166/slanted-button -->

<button class="btn-166">
    <span>Button 166</span>
</button>
</body>
</html>
