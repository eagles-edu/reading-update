<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Animated 3D Buttons</title>
<style>
.btn-173 {
    position: relative;
    width: 150px;
    height: 50px;
    transition: 4s;
    transform-style: preserve-3d;
    transform: perspective(1000px) rotateX(0deg);
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
    cursor: pointer;
    text-decoration: none;
    user-select: none;
    display: inline-flex;
    justify-content: center;
    align-items: center;
    border: none;
    padding: 0;
    background: none;
    /*** full width block ***/
    /* width: 100%; */
}

.btn-173:hover {
    transform: perspective(1000px) rotateX(-360deg);
}

.btn-173 span {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #000;
    background: rgba(255, 255, 255, 0.9);
    font-family: sans-serif;
    font-size: 18px;
    transition: 0.5s;
    border: 1px solid #5e5e5e;
    box-sizing: border-box;
}

.btn-173:hover span {
    color: #fff;
    background: rgba(244, 3, 3, 0.7);
}

.btn-173 span:nth-child(1) {
    transform: rotateX(360deg) translateZ(25px);
}

.btn-173 span:nth-child(2) {
    transform: rotateX(270deg) translateZ(25px);
}

.btn-173 span:nth-child(3) {
    transform: rotateX(180deg) translateZ(25px);
}

.btn-173 span:nth-child(4) {
    transform: rotateX(90deg) translateZ(25px);
}

/*** disabled style ***/
.btn-173:disabled {
    pointer-events: none;
    opacity: .65;
    color: #7e7e7e;
    background: #dcdcdc;
    box-shadow: none;
    text-shadow: none;
}

.btn-173:disabled span {
    color: #7e7e7e;
    background: #dcdcdc;
}

.btn-173:disabled span:nth-child(3) {
    transform: rotateX(0) translateZ(0);
}
</style>
</head>
<body>
<!-- https://www.css-buttons.com/buttons/173/animated-3d-buttons -->

<button class="btn-173" type="button">
    <span>Button 173</span>
    <span>Button 173</span>
    <span>Button 173</span>
    <span>Button 173</span>
</button>
</body>
</html>
