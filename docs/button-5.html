<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Bootstrap Style Button Warning Color</title>
<style>
.btn-5 {
    display: inline-block;
    color: #212529;
    text-align: center;
    text-decoration: none;
    vertical-align: middle;
    cursor: pointer;
    user-select: none;
    padding: 12px 20px;
    font-size: 14px;
    border-radius: .25rem;
    border: solid 1px;
    font-weight: bold;
    letter-spacing: 1.2px;
    /*** full width block ***/
    /* width: 100%; */
}

.btn-5-colors {
    color: #000;
    background-color: #ffca2c;
    border-color: #ffc720;
}

.btn-5:hover {
    color: #000;
    background-color: #ffc107;
    border-color: #ffc107;
}

.btn-5:active {
    box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.24);
}

.btn-5:disabled {
    pointer-events: none;
    opacity: .65;
}
</style>
</head>
<body>
<!-- https://www.css-buttons.com/buttons/5/bootstrap-style-button-warning-color -->

<button type="button" class="btn-5 btn-5-colors">Button 5</button>
</body>
</html>
